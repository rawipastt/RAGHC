<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAGHC Portal | Management Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="bg-slate-900 text-white py-2 text-center text-[10px] font-bold uppercase tracking-widest">
        Next Assembly: 20 APR | Next Board: 15 APR
    </div>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <h2 class="text-center text-3xl font-black uppercase italic mb-12 tracking-tighter">Management Hub</h2>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col">
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-12 h-12 bg-slate-900 text-white rounded-xl flex items-center justify-center text-xl">
                        <i class="fas fa-handshake"></i>
                    </div>
                    <h3 class="font-bold text-xl">External CRM</h3>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl mb-6">
                    <p class="text-xs font-bold text-slate-500 uppercase">Current Partners</p>
                    <p class="text-xl font-bold text-blue-600">12 Organizations</p>
                </div>
                <a href="#" class="block w-full py-4 bg-slate-900 text-white text-center rounded-2xl font-bold text-xs uppercase italic shadow-lg">Access CRM Spreadsheet</a>
            </div>

            <div class="bg-[#0f172a] p-8 rounded-[2.5rem] shadow-2xl text-white flex flex-col">
                <div class="flex justify-between items-center mb-8">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-xl shadow-lg shadow-blue-500/20">
                            <i class="fas fa-bullhorn"></i>
                        </div>
                        <h3 class="font-bold text-xl italic text-white">PR Production Hub</h3>
                    </div>
                    <a href="#" class="bg-rose-500 px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Request PR</a>
                </div>
                
                <div class="bg-white/5 rounded-3xl border border-white/10 p-6 flex-grow min-h-[200px]">
                    <p class="text-[9px] font-bold text-blue-400 uppercase tracking-widest mb-4">
                        <i class="fas fa-sync-alt fa-spin mr-1"></i> Live Work-Flow
                    </p>
                    <div class="text-center py-10 opacity-20 italic text-xs uppercase tracking-widest">
                        Syncing Database...
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
